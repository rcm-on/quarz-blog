  <!-- Neural arborescence background — RCM brand -->
  <g id="edges" stroke="rgba(67,56,202,0.55)" stroke-width="0.8" fill="none">
    <!-- Top cluster -->
    <line x1="60"  y1="90"  x2="190" y2="35"/>
    <line x1="60"  y1="90"  x2="110" y2="210"/>
    <line x1="190" y1="35"  x2="370" y2="70"/>
    <line x1="190" y1="35"  x2="275" y2="160"/>
    <line x1="370" y1="70"  x2="540" y2="50"/>
    <line x1="370" y1="70"  x2="440" y2="190"/>
    <line x1="540" y1="50"  x2="570" y2="180"/>
    <!-- Middle cluster -->
    <line x1="110" y1="210" x2="275" y2="160"/>
    <line x1="110" y1="210" x2="40"  y2="330"/>
    <line x1="110" y1="210" x2="170" y2="350"/>
    <line x1="275" y1="160" x2="440" y2="190"/>
