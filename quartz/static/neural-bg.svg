    <line x1="40"  y1="330" x2="80"  y2="490"/>
    <line x1="170" y1="350" x2="340" y2="310"/>
    <line x1="170" y1="350" x2="80"  y2="490"/>
    <line x1="170" y1="350" x2="250" y2="470"/>
    <line x1="340" y1="310" x2="510" y2="320"/>
    <line x1="340" y1="310" x2="250" y2="470"/>
    <line x1="340" y1="310" x2="420" y2="460"/>
    <line x1="510" y1="320" x2="590" y2="340"/>
    <line x1="510" y1="320" x2="420" y2="460"/>
    <line x1="590" y1="340" x2="560" y2="500"/>
