    <circle cx="190" cy="35"  r="3.4"/>
    <circle cx="370" cy="70"  r="3.0"/>
    <circle cx="540" cy="50"  r="2.4"/>
    <circle cx="570" cy="180" r="2.4"/>
    <circle cx="110" cy="210" r="3.2"/>
    <circle cx="275" cy="160" r="3.8"/>
    <circle cx="440" cy="190" r="3.0"/>
    <circle cx="40"  cy="330" r="2.2"/>
    <circle cx="170" cy="350" r="3.6"/>
    <circle cx="340" cy="310" r="3.8"/>
    <circle cx="510" cy="320" r="3.2"/>
    <circle cx="590" cy="340" r="2.2"/>
    <circle cx="80"  cy="490" r="2.6"/>
    <circle cx="250" cy="470" r="3.4"/>
    <circle cx="420" cy="460" r="3.4"/>
    <circle cx="560" cy="500" r="2.6"/>
    <circle cx="130" cy="590" r="2.2"/>
    <circle cx="310" cy="580" r="2.8"/>
    <circle cx="480" cy="590" r="2.4"/>
  </g>
  <!-- Coral accent — nodos clave (AACC: los que más conectan) -->
  <g id="hubs" fill="rgba(249,115,22,0.85)">
    <circle cx="275" cy="160" r="2.0"/>
    <circle cx="340" cy="310" r="2.0"/>
    <circle cx="170" cy="350" r="1.8"/>
