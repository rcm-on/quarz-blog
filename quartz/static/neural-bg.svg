    <line x1="250" y1="470" x2="310" y2="580"/>
    <line x1="420" y1="460" x2="560" y2="500"/>
    <line x1="420" y1="460" x2="310" y2="580"/>
    <line x1="420" y1="460" x2="480" y2="590"/>
    <line x1="560" y1="500" x2="480" y2="590"/>
