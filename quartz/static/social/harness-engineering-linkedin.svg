<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627">
  <defs>
    <radialGradient id="bg-glow" cx="25%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0c0d18"/>
    </radialGradient>
    <radialGradient id="accent-indigo" cx="20%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#4338ca" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="accent-amber" cx="80%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#b45309" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b45309" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="627" fill="url(#bg-glow)"/>
  <rect width="1200" height="627" fill="url(#accent-indigo)"/>
  <rect width="1200" height="627" fill="url(#accent-amber)"/>

  <!-- Grid de puntos -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1.1" fill="rgba(129,140,248,0.08)"/>
  </pattern>
  <rect width="1200" height="627" fill="url(#dots)"/>

  <!-- Línea decorativa superior -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent-indigo-line)"/>
  <linearGradient id="accent-indigo-line" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#4338ca" stop-opacity="0"/>
    <stop offset="30%" stop-color="#4338ca" stop-opacity="1"/>
    <stop offset="70%" stop-color="#b45309" stop-opacity="1"/>
    <stop offset="100%" stop-color="#b45309" stop-opacity="0"/>
  </linearGradient>

  <!-- Diagrama nodos — lado derecho -->
  <circle cx="980" cy="314" r="48" fill="none" stroke="#4338ca" stroke-width="1.5" opacity="0.5"/>
  <circle cx="980" cy="314" r="10" fill="#4338ca" opacity="0.9"/>

  <circle cx="840" cy="220" r="6" fill="#818cf8" opacity="0.7"/>
  <circle cx="840" cy="408" r="6" fill="#818cf8" opacity="0.7"/>
  <circle cx="1120" cy="220" r="6" fill="#818cf8" opacity="0.7"/>
  <circle cx="1120" cy="408" r="6" fill="#818cf8" opacity="0.7"/>
  <circle cx="1170" cy="314" r="7" fill="#fbbf24" opacity="0.9"/>
  <circle cx="790" cy="314" r="7" fill="#fbbf24" opacity="0.9"/>

  <line x1="980" y1="314" x2="840" y2="220" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="980" y1="314" x2="840" y2="408" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="980" y1="314" x2="1120" y2="220" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="980" y1="314" x2="1120" y2="408" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="980" y1="314" x2="1170" y2="314" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
  <line x1="980" y1="314" x2="790" y2="314" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>

  <circle cx="980" cy="314" r="80" fill="none" stroke="#4338ca" stroke-width="0.5" opacity="0.15" stroke-dasharray="4 10"/>

  <!-- Etiqueta autor -->
  <text x="80" y="108" fill="#818cf8" font-size="15" font-family="JetBrains Mono, monospace" opacity="0.75">Ramón Campos Martin · Arquitecto de Software</text>

  <!-- Categoría -->
  <rect x="80" y="135" width="130" height="28" rx="14" fill="rgba(67,56,202,0.25)" stroke="#4338ca" stroke-width="1" opacity="0.8"/>
  <text x="145" y="153" fill="#818cf8" font-size="12" font-family="JetBrains Mono, monospace" text-anchor="middle" opacity="0.9">Arquitectura IA</text>

  <!-- Título principal -->
  <text x="80" y="250" fill="#e8ecf8" font-size="62" font-family="Manrope, sans-serif" font-weight="800" letter-spacing="-2">Harness</text>
  <text x="80" y="328" fill="#818cf8" font-size="62" font-family="Manrope, sans-serif" font-weight="800" letter-spacing="-2">Engineering</text>

  <!-- Subtítulo -->
  <text x="80" y="390" fill="#bcc5d8" font-size="22" font-family="Source Sans 3, sans-serif" opacity="0.85">La autonomía de un agente no es una propiedad</text>
  <text x="80" y="420" fill="#bcc5d8" font-size="22" font-family="Source Sans 3, sans-serif" opacity="0.85">del modelo. Es una propiedad del harness.</text>

  <!-- Separador -->
  <rect x="80" y="460" width="60" height="2" fill="#4338ca" opacity="0.6"/>

  <!-- URL blog -->
  <text x="80" y="495" fill="#818cf8" font-size="14" font-family="JetBrains Mono, monospace" opacity="0.6">blog.rcmon.dev</text>

  <!-- Marca RCM -->
  <text x="80" y="580" fill="#4338ca" font-size="18" font-family="Manrope, sans-serif" font-weight="800" opacity="0.5">RCM ◈</text>
</svg>
