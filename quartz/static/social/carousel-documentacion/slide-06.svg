  <text x="80" y="348" fill="#e8ecf8" font-size="54" font-family="Manrope, sans-serif" font-weight="800" letter-spacing="-1.5">documentar o no.</text>

  <rect x="80" y="390" width="920" height="2" rx="1" fill="#4338ca" opacity="0.2"/>

  <text x="80" y="470" fill="#818cf8" font-size="54" font-family="Manrope, sans-serif" font-weight="800" letter-spacing="-1.5">Es documentar bien</text>
