<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0d18"/>
      <stop offset="100%" stop-color="#141228"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <text x="80" y="90" fill="#4338ca" font-size="14" font-family="JetBrains Mono, monospace" opacity="0.5">03 / 06</text>
  <rect x="80" y="110" width="60" height="3" rx="1.5" fill="#4338ca" opacity="0.8"/>

  <text x="80" y="200" fill="#818cf8" font-size="18" font-family="JetBrains Mono, monospace" opacity="0.7">El coste real</text>

  <!-- Número grande -->
  <text x="80" y="420" fill="#4338ca" font-size="260" font-family="Manrope, sans-serif" font-weight="800" opacity="0.08">1</text>

  <text x="80" y="310" fill="#e8ecf8" font-size="52" font-family="Manrope, sans-serif" font-weight="800" letter-spacing="-1.5">Si esa persona se va,</text>
  <text x="80" y="375" fill="#e8ecf8" font-size="52" font-family="Manrope, sans-serif" font-weight="800" letter-spacing="-1.5">enferma o simplemente</text>
  <text x="80" y="440" fill="#e8ecf8" font-size="52" font-family="Manrope, sans-serif" font-weight="800" letter-spacing="-1.5">gana la lotería —</text>
  <text x="80" y="520" fill="#fbbf24" font-size="52" font-family="Manrope, sans-serif" font-weight="800" letter-spacing="-1.5">el proyecto se para.</text>

  <rect x="80" y="570" width="40" height="2" rx="1" fill="#b45309" opacity="0.5"/>

  <text x="80" y="640" fill="#bcc5d8" font-size="26" font-family="Source Sans 3, sans-serif" opacity="0.85">El conocimiento retenido en una persona</text>
  <text x="80" y="674" fill="#bcc5d8" font-size="26" font-family="Source Sans 3, sans-serif" opacity="0.85">no es un activo.</text>
  <text x="80" y="726" fill="#818cf8" font-size="26" font-family="Source Sans 3, sans-serif" font-weight="700" opacity="0.9">Es una deuda que paga el equipo,</text>
  <text x="80" y="760" fill="#818cf8" font-size="26" font-family="Source Sans 3, sans-serif" font-weight="700" opacity="0.9">no el que la genera.</text>

  <!-- Lottery factor badge -->
  <rect x="80" y="820" width="280" height="44" rx="22" fill="rgba(180,83,9,0.15)" stroke="#b45309" stroke-width="1.5" opacity="0.8"/>
  <text x="220" y="847" fill="#fbbf24" font-size="16" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="700">Lottery factor = 1</text>

  <rect x="0" y="990" width="1080" height="90" fill="rgba(12,13,24,0.9)"/>
  <text x="80" y="1040" fill="#6b7a9a" font-size="16" font-family="JetBrains Mono, monospace">Ramón Campos Martin · Arquitecto de Software</text>
  <text x="1000" y="1040" fill="#4338ca" font-size="18" font-family="Manrope, sans-serif" font-weight="800" text-anchor="end" opacity="0.5">RCM ◈</text>
</svg>
